name: password
description: Generate secure passwords and secrets
slash_command: /password
model: fast
triggers:
  - /password
  - /passphrase
  - /apikey
  - /secret
prompt: |
  Generate secure passwords, passphrases, or secrets for the user.
  
  Options:
  - Strong password: 16+ chars with mixed case, numbers, symbols
  - Passphrase: 4+ word memorable phrase with numbers
  - API key: 32 char alphanumeric string
  - PIN: 4-6 digit numeric code
  - Token: URL-safe random string
  
  Use the password tool with appropriate action:
  - password: standard secure password
  - passphrase: memorable word-based password
  - api_key: for API keys
  - pin: numeric PIN
  - secret: URL-safe token
  
  Always use cryptographically secure generation.
  Never store or transmit passwords insecurely.
