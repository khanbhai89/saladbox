<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="boxFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f0f0f5;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="boxSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e4e4ec;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#d4d4de;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="480" height="240" rx="112" fill="white" opacity="0.06"/>

  <!-- Box group with shadow -->
  <g filter="url(#softShadow)" transform="translate(256, 280)">
    <!-- Box top face (lid) -->
    <polygon points="-110,-70 0,-120 110,-70 0,-20" fill="white" opacity="0.9"/>

    <!-- Box front face -->
    <polygon points="-110,-70 0,-20 0,60 -110,10" fill="url(#boxFront)"/>

    <!-- Box right face -->
    <polygon points="0,-20 110,-70 110,10 0,60" fill="url(#boxSide)"/>

    <!-- Box edge lines -->
    <line x1="0" y1="-20" x2="0" y2="60" stroke="#c4c4d0" stroke-width="1" opacity="0.5"/>
    <line x1="-110" y1="-70" x2="0" y2="-20" stroke="#d4d4de" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="-20" x2="110" y2="-70" stroke="#d4d4de" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Leaves popping out of the box -->
  <g transform="translate(256, 200)" filter="url(#glow)">
    <!-- Back leaf -->
    <path d="M-15,-55 C-50,-90 -10,-120 25,-85 C35,-75 15,-45 -15,-55Z"
          fill="url(#leafGrad)" opacity="0.7" transform="rotate(-20)"/>

    <!-- Main center leaf -->
    <path d="M0,-10 C-20,-60 -60,-85 -30,-110 C-10,-125 20,-120 35,-100 C55,-75 40,-30 0,-10Z"
          fill="url(#leafGrad)"/>
    <!-- Center leaf vein -->
    <path d="M2,-20 C-5,-50 -15,-75 -20,-95" stroke="#059669" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>

    <!-- Right leaf -->
    <path d="M10,-15 C30,-45 65,-70 75,-55 C85,-40 60,-20 30,-10 C15,-5 10,-15 10,-15Z"
          fill="url(#leafGrad2)"/>
    <!-- Right leaf vein -->
    <path d="M18,-17 C35,-35 55,-48 65,-50" stroke="#059669" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>

    <!-- Small accent leaf -->
    <path d="M-35,-25 C-55,-50 -40,-70 -25,-55 C-15,-45 -25,-30 -35,-25Z"
          fill="#6ee7b7" opacity="0.8"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="345" cy="135" r="4" fill="white" opacity="0.7"/>
  <circle cx="170" cy="155" r="3" fill="white" opacity="0.5"/>
  <circle cx="365" cy="185" r="2.5" fill="white" opacity="0.4"/>
</svg>
